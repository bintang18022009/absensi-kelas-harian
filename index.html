<!-- ========================================= -->

<!-- Aplikasi Absensi Kelas Harian -->
<!-- Versi Background Pink Modern -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aplikasi Absensi Kelas Harian</title>

    <!-- CSS -->
    <style>

        /* Background utama */
        body {
            font-family: Arial, sans-serif;

            /* Warna background pink gradasi */
            background: linear-gradient(135deg, #ff9ecf, #ffc1e3);

            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0;
            overflow: hidden;
        }

        /* Lingkaran dekorasi background */
        .circle1 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            top: -50px;
            left: -50px;
        }

        .circle2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
        }

        /* Kotak utama */
        .container {
            width: 400px;
            background: white;

            padding: 25px;
            border-radius: 20px;

            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);

            position: relative;
            z-index: 2;
        }

        /* Judul */
        h2 {
            text-align: center;
            color: #ff4fa3;
            margin-bottom: 20px;
        }

        /* Label */
        label {
            font-weight: bold;
            color: #444;
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px;

            margin-top: 5px;
            margin-bottom: 15px;

            border-radius: 10px;
            border: 1px solid #ccc;

            font-size: 14px;
        }

        /* Efek saat input diklik */
        input:focus {
            border-color: #ff4fa3;
            outline: none;
            box-shadow: 0px 0px 5px pink;
        }

        /* Tombol */
        button {
            width: 100%;
            padding: 12px;

            background: linear-gradient(135deg, #ff4fa3, #ff77b7);

            color: white;
            border: none;

            border-radius: 10px;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;
            transition: 0.3s;
        }

        /* Hover tombol */
        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        /* Hasil output */
        .hasil {
            margin-top: 20px;

            background: #fff0f7;

            padding: 15px;
            border-radius: 10px;

            display: none;

            border-left: 5px solid #ff4fa3;
        }

        /* Teks hasil */
        .hasil p {
            margin: 8px 0;
        }

    </style>
</head>
<body>

    <!-- Dekorasi Lingkaran -->
    <div class="circle1"></div>
    <div class="circle2"></div>

    <!-- Container utama -->
    <div class="container">

        <!-- Judul -->
        <h2>🌸 Aplikasi Absensi Kelas 🌸</h2>

        <!-- Form input -->

        <label>Nama Siswa</label>
        <input type="text" id="nama" placeholder="Masukkan nama siswa">

        <label>Kelas</label>
        <input type="text" id="kelas" placeholder="Masukkan kelas">

        <label>Nomor Absen</label>
        <input type="number" id="absen" placeholder="Masukkan nomor absen">

        <label>Waktu Absen</label>
        <input type="text" id="waktu" placeholder="Contoh: 07.00 WIB">

        <!-- Tombol -->
        <button onclick="kirimAbsensi()">
            Kirim Absensi
        </button>

        <!-- Hasil output -->
        <div class="hasil" id="hasil">

            <h3>📋 Rekap Absensi</h3>

            <p><b>Nama Siswa :</b> <span id="outNama"></span></p>

            <p><b>Kelas :</b> <span id="outKelas"></span></p>

            <p><b>Nomor Absen :</b> <span id="outAbsen"></span></p>

            <p><b>Waktu Absen :</b> <span id="outWaktu"></span></p>

            <hr>

            <p>
                ✅ Absensi anda sudah kami terima,<br>
                kami akan mengirimkan petugas terkait.
            </p>

        </div>

    </div>

    <!-- JavaScript -->
    <script>

        // Fungsi untuk menampilkan hasil absensi
        function kirimAbsensi() {

            // Mengambil data dari input
            let nama = document.getElementById("nama").value;
            let kelas = document.getElementById("kelas").value;
            let absen = document.getElementById("absen").value;
            let waktu = document.getElementById("waktu").value;

            // Menampilkan data ke output
            document.getElementById("outNama").innerText = nama;
            document.getElementById("outKelas").innerText = kelas;
            document.getElementById("outAbsen").innerText = absen;
            document.getElementById("outWaktu").innerText = waktu;

            // Menampilkan hasil
            document.getElementById("hasil").style.display = "block";
        }

    </script>

</body>
</html>
